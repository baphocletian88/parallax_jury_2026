  };

// ─── FIREBASE OPS ─────────────────────────────────────────────────────────────
async function saveToFirebase(filmId, criteriaId, value) {
  if (!db) return;
  const docId = `${currentJudge}_${filmId}`;
  await setDoc(doc(db, 'scores', docId), {
    judgeId: currentJudge,
    judgeName: JUDGE_NAMES[currentJudge] || `Juez ${currentJudge}`,
    filmId,
    [`criteria.${criteriaId}`]: value,
    updatedAt: serverTimestamp()
  }, { merge: true });
}

function setupRealtimeListeners() {
  const unsub = onSnapshot(collection(db, 'scores'), (snap) => {
    snap.forEach(d => {
      const data = d.data();
      const key = `${data.judgeId}_${data.filmId}`;
      if (!allScores[key]) allScores[key] = {};
      Object.assign(allScores[key], data);
    });
    updateRankingPanel();
    updateLiveIndicators();
  });
  unsubscribers.push(unsub);
}

// ─── SCORE CALCULATION ────────────────────────────────────────────────────────
function calcFilmScore(filmId, judgeId, rubricKey) {
  const key = judgeId ? `${judgeId}_${filmId}` : `${currentJudge}_${filmId}`;
  const data = judgeId ? allScores[key] : scores[filmId];
  if (!data) return 0;
  const rubric = RUBRICS[rubricKey];
  if (!rubric) return 0;
  return rubric.reduce((sum, c) => {
    const val = judgeId ? (data.criteria?.[c.id] || 0) : (data[c.id] || 0);
    return sum + (val * c.weight);
  }, 0);
}

function getMaxScore(rubricKey) {
  const rubric = RUBRICS[rubricKey];
  if (!rubric) return 100;
  return rubric.reduce((s, c) => s + c.weight * 5, 0);
}

function getFilmScoreLocal(filmId) {
  if (!scores[filmId]) return 0;
  // Compute from current category rubric
  const cat = CATEGORIES[currentCategory];
  if (!cat) return 0;
  const rubric = RUBRICS[cat.rubric];
  return rubric.reduce((sum, c) => {
    return sum + ((scores[filmId][c.id] || 0) * c.weight);
  }, 0);
}

function updateFilmTotal(filmId) {
  const cat = CATEGORIES[currentCategory];
  if (!cat) return;
  const total = getFilmScoreLocal(filmId);
  const max = getMaxScore(cat.rubric);
  const el = document.querySelector(`[data-total="${filmId}"]`);
  if (el) {
    el.textContent = total;
    el.style.color = total > max*0.8 ? '#00e5a0' : total > max*0.6 ? '#f59e0b' : '#ffffff';
  }
  const pct = document.querySelector(`[data-progress="${filmId}"]`);
  if (pct) {
    pct.style.width = `${(total/max)*100}%`;
    pct.style.background = total > max*0.8 ? '#00e5a0' : total > max*0.6 ? '#f59e0b' : '#7c3aed';
  }
}

function updateRankingPanel() {
  const panel = document.querySelector('.ranking-panel');
  if (!panel || currentCategory === 'overview') return;
  const cat = CATEGORIES[currentCategory];
  if (!cat) return;

  const allFilms = getAllFilmsForView();
  const ranked = allFilms.map(f => ({
    ...f,
    score: getFilmScoreLocal(f.id),
    max: getMaxScore(cat.rubric)
  })).sort((a,b) => b.score - a.score);

  panel.innerHTML = `
    <div class="ranking-header">
      <span class="ranking-title">RANKING EN VIVO</span>
      <span class="ranking-cat" style="color:${cat.color}">${cat.label}</span>
    </div>
    <div class="ranking-list">
      ${ranked.map((f, i) => `
        <div class="ranking-item ${i===0&&f.score>0?'leader':''}">
          <span class="ranking-pos">${i+1}</span>
          <span class="ranking-name">${f.title}</span>
          <span class="ranking-score" style="color:${i===0&&f.score>0?cat.color:'#888'}">${f.score}<span style="font-size:10px;color:#444">/${f.max}</span></span>
        </div>`).join('')}
    </div>`;
}

function updateLiveIndicators() {
  // Update progress dots in nav
  Object.entries(CATEGORIES).forEach(([catId, cat]) => {
    const allFilms = getAllFilmsForCategory(catId);
    let evaluated = 0;
    allFilms.forEach(f => {
      if (scores[f.id] && Object.keys(scores[f.id]).some(k => scores[f.id][k] > 0)) evaluated++;
    });
    const dot = document.querySelector(`[data-tab="${catId}"] .nav-dot`);
    if (dot && evaluated === allFilms.length && allFilms.length > 0) {
      dot.style.boxShadow = `0 0 6px ${cat.color}`;
    }
  });
}

function getAllFilmsForView() {
  if (currentCategory === 'internacional') return FILMS.intl;
  return [...FILMS['2d'], ...FILMS['3d'], ...FILMS.intl];
}

function getAllFilmsForCategory(catId) {
  if (catId === 'internacional') return FILMS.intl;
  if (catId === 'animacion-2d') return FILMS['2d'];
  if (catId === 'animacion-3d') return FILMS['3d'];
  // narrativa and direccion-arte: all propios (2D + 3D)
  return [...FILMS['2d'], ...FILMS['3d']];
}

            ${hasScores ? '<span class="pill-check">✓</span>' : '<span class="pill-pending">—</span>'}
          </div>`}).join('')}
      </div>
    </div>`;
}

// ─── CATEGORY VIEW ────────────────────────────────────────────────────────────
function renderCategoryView(catId) {
  const cat = CATEGORIES[catId];
  const films = getAllFilmsForCategory(catId);
  const rubric = RUBRICS[cat.rubric];
  const maxScore = getMaxScore(cat.rubric);

  $('main-content').innerHTML = `
    <!-- Category Header -->
    <div class="cat-header" style="--cat-color:${cat.color}">
      <div class="cat-header-left">
        <div class="cat-header-badge" style="border-color:${cat.color};color:${cat.color}">
          CATEGORÍA · ${cat.label.toUpperCase()}
        </div>
        <h1 class="cat-header-title">${cat.label}</h1>
        <div class="cat-header-meta">${films.length} cortometrajes · ${maxScore} puntos máx. · ${JUDGE_NAMES[currentJudge] || 'Juez ' + currentJudge}</div>
      </div>
      <div class="cat-header-right">
        <div class="cat-score-overview">
          <span class="cat-evaluated-count" id="evaluated-count">0</span>
          <span class="cat-evaluated-label">/ ${films.length}<br><small>EVALUADOS</small></span>
        </div>
      </div>
    </div>

    <!-- Main layout: films + ranking sidebar -->
    <div class="cat-layout">
      <!-- Film list -->
      <div class="films-column">
        <!-- Search -->
        <div class="search-bar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Buscar cortometraje..." oninput="filterFilms(this.value)" class="search-input">
        </div>

        <!-- Film cards -->
        <div class="films-list" id="films-list">
          ${films.map((film, idx) => renderFilmCard(film, rubric, maxScore, cat.color, idx)).join('')}
        </div>
      </div>

      <!-- Ranking sidebar -->
      <aside class="ranking-sidebar">
        <div class="ranking-panel">
          <div class="ranking-header">
            <span class="ranking-title">RANKING EN VIVO</span>
            <span class="ranking-cat" style="color:${cat.color}">${cat.label}</span>
          </div>
          <div class="ranking-list">
            ${films.map((f,i) => `
              <div class="ranking-item">
                <span class="ranking-pos">${i+1}</span>
                <span class="ranking-name">${f.title}</span>
                <span class="ranking-score">0<span style="font-size:10px;color:#444">/${maxScore}</span></span>
              </div>`).join('')}
          </div>
        </div>

        <!-- Criteria legend -->
        <div class="criteria-legend">
          <div class="legend-title">CRITERIOS · PESOS</div>
          ${rubric.map(c => `
            <div class="legend-item">
              <div class="legend-label">${c.label}</div>
              <div class="legend-weight">×${c.weight} <span style="color:#333">= máx ${c.weight*5}</span></div>
            </div>`).join('')}
          <div class="legend-total">TOTAL MÁXIMO: ${maxScore} pts</div>
        </div>
      </aside>
    </div>`;

  window.filterFilms = function(query) {
    document.querySelectorAll('.film-card').forEach(card => {
      const title = card.querySelector('.film-title').textContent.toLowerCase();
      card.style.display = title.includes(query.toLowerCase()) ? '' : 'none';
    });
  };

  updateEvaluatedCount(films);
}

function renderFilmCard(film, rubric, maxScore, catColor, idx) {
  const s = scores[film.id] || {};
  const total = rubric.reduce((sum, c) => sum + ((s[c.id]||0)*c.weight), 0);
  const isFinalized = s.finalized;

  return `
  <div class="film-card ${isFinalized?'finalized':''}" data-film="${film.id}" style="animation-delay:${idx*0.04}s">
    <!-- Card header -->
    <div class="film-card-header">
      <div class="film-card-header-left">
        <span class="film-type-badge" style="border-color:${catColor};color:${catColor}">${film.type}</span>
        <span class="film-status ${isFinalized?'finalized':''}">${isFinalized?'✓ FINALIZADO':'PENDIENTE'}</span>
      </div>
      <div class="film-card-header-right">
        <span class="film-total" data-total="${film.id}" style="color:${total>maxScore*0.8?'#00e5a0':total>maxScore*0.6?'#f59e0b':'#fff'}">${total}</span>
        <span class="film-max">/${maxScore}</span>
      </div>
    </div>

    <!-- Title row -->
    <div class="film-title-row">
      <h3 class="film-title">${film.title}</h3>
      <div class="film-meta">${film.director} · ${film.duration}</div>
    </div>

    <!-- Progress bar -->
    <div class="film-progress-track">
      <div class="film-progress-fill" data-progress="${film.id}" style="width:${(total/maxScore)*100}%;background:${total>maxScore*0.8?'#00e5a0':total>maxScore*0.6?'#f59e0b':'#7c3aed'}"></div>
    </div>

    <!-- Scoring rows -->
    <div class="scoring-grid">
      ${rubric.map(c => `
        <div class="scoring-row">
          <div class="scoring-criterion">
            <span class="criterion-name">${c.label}</span>
            <span class="criterion-desc">${c.desc}</span>
          </div>
          <div class="scoring-controls" data-score="${film.id}-${c.id}">
            ${[1,2,3,4,5].map(n => `
              <button class="score-btn ${(s[c.id]||0)===n?'active':''}"
                onclick="setScore('${film.id}','${c.id}',${n})"
                style="--active-color:${n>=4?'#00e5a0':n===3?'#f59e0b':'#ef4444'}">${n}</button>`).join('')}
            <span class="score-weight">×${c.weight}</span>
            <span class="score-subtotal">${(s[c.id]||0)*c.weight}</span>
          </div>
        </div>`).join('')}
    </div>

    <!-- Notes -->
    <div class="notes-section">
      <label class="notes-label">OBSERVACIONES DEL JUEZ</label>
      <textarea class="notes-textarea" data-notes="${film.id}"
        placeholder="Notas sobre esta pieza para la deliberación..."
        oninput="autoSaveNotes(this, '${film.id}')">${s.notes||''}</textarea>
    </div>

    <!-- Actions -->
    <div class="card-actions">
      <button class="btn-finalize ${isFinalized?'done':''}" onclick="finalizeEvaluation('${film.id}')">
        ${isFinalized ? '✓ Evaluación finalizada' : 'Finalizar evaluación'}
      </button>
      <div class="card-actions-right">
        <span class="last-saved" id="saved-${film.id}"></span>
      </div>
    </div>
  </div>`;
}

function updateEvaluatedCount(films) {
  let count = 0;
  films.forEach(f => {
    if (scores[f.id] && Object.values(scores[f.id]).some(v => typeof v==='number'&&v>0)) count++;
  });
  const el = $('evaluated-count');
  if (el) el.textContent = count;
}

let saveTimers = {};
window.autoSaveNotes = function(ta, filmId) {
  clearTimeout(saveTimers[filmId]);
  saveTimers[filmId] = setTimeout(() => window.saveNotes(filmId), 800);
};

function showSaveConfirm(filmId) {
  const el = document.getElementById(`saved-${filmId}`);
  if (el) {
    el.textContent = '✓ Guardado';
    el.style.color = '#00e5a0';
    setTimeout(() => { el.textContent = ''; }, 2000);
  }
}
</script>
