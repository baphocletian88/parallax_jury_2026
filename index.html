let scores = {}; // local state { filmId: { criteriaId: score, notes: '' } }
let allScores = {}; // both judges combined for ranking

// ── LOCALSTORAGE PERSISTENCE ─────────────────────────────────────────────────
const LS_SCORES  = () => `parallax_scores_${currentJudge}`;
const LS_SESSION = 'parallax_session_judge';

function persistScores() {
  try {
    localStorage.setItem(LS_SCORES(), JSON.stringify(scores));
    localStorage.setItem('parallax_scores_ts_' + currentJudge, Date.now().toString());
  } catch(e) { console.warn('localStorage unavailable:', e); }
}

function loadLocalScores() {
  try {
    const raw = localStorage.getItem(LS_SCORES());
    if (raw) {
      const parsed = JSON.parse(raw);
      // Merge into scores without overwriting newer Firebase data
      Object.entries(parsed).forEach(([filmId, data]) => {
        if (!scores[filmId]) scores[filmId] = {};
        Object.assign(scores[filmId], data);
      });
    }
  } catch(e) {}
}

function saveSession() {
  try { localStorage.setItem(LS_SESSION, currentJudge); } catch(e) {}
}

function restoreSession() {
  try { return localStorage.getItem(LS_SESSION); } catch(e) { return null; }
}

function clearSession() {
  try { localStorage.removeItem(LS_SESSION); } catch(e) {}
}

// ─── FIREBASE OPS ─────────────────────────────────────────────────────────────
async function saveToFirebase(filmId, criteriaId, value) {
  if (!db) return;
  const docId = `${currentJudge}_${filmId}`;
  await setDoc(doc(db, 'scores', docId), {
    judgeId: currentJudge,
    judgeName: JUDGE_NAMES[currentJudge] || `Juez ${currentJudge}`,
    filmId,
    [`criteria.${criteriaId}`]: value,
    updatedAt: serverTimestamp()
  }, { merge: true });
}

function setupRealtimeListeners() {
  const unsub = onSnapshot(collection(db, 'scores'), (snap) => {
    snap.forEach(d => {
      const data = d.data();
      const key = `${data.judgeId}_${data.filmId}`;
      if (!allScores[key]) allScores[key] = {};
      Object.assign(allScores[key], data);
    });
    updateRankingPanel();
    updateLiveIndicators();
  });
  unsubscribers.push(unsub);
}

// ── HYDRATE local scores from Firebase on load ───────────────────────────────
async function hydrateFromFirebase() {
  if (!db || !currentJudge) return;
  try {
    const snap = await getDocs(collection(db, 'scores'));
    let hydrated = false;
    snap.forEach(d => {
      const data = d.data();
      // Only load scores that belong to current judge
      if (data.judgeId !== currentJudge) return;
      const filmId = data.filmId;
      if (!filmId) return;
      if (!scores[filmId]) scores[filmId] = {};
      // Map criteria fields back to local scores object
      if (data.criteria) {
        Object.entries(data.criteria).forEach(([k,v]) => {
          scores[filmId][k] = v;
        });
      }
      // Also handle flat criteria.X fields from saveToFirebase
      Object.entries(data).forEach(([k,v]) => {
        if (k.startsWith('criteria.')) {
          scores[filmId][k.replace('criteria.','')] = v;
        }
      });
      if (data.notes)     scores[filmId].notes     = data.notes;
      if (data.finalized) scores[filmId].finalized = data.finalized;
      hydrated = true;
    });
    if (hydrated) {
      persistScores(); // sync Firebase data into localStorage
      // Re-render current view with hydrated scores
      if (currentCategory === 'overview') renderOverview();
      else renderCategoryView(currentCategory);
    }
  } catch(e) { console.warn('Firebase hydration error:', e); }
}

// ─── SCORE CALCULATION ────────────────────────────────────────────────────────
function calcFilmScore(filmId, judgeId, rubricKey) {
  const key = judgeId ? `${judgeId}_${filmId}` : `${currentJudge}_${filmId}`;
  const data = judgeId ? allScores[key] : scores[filmId];
  if (!data) return 0;
  const rubric = RUBRICS[rubricKey];
  if (!rubric) return 0;
  return rubric.reduce((sum, c) => {
    const val = judgeId ? (data.criteria?.[c.id] || 0) : (data[c.id] || 0);
    return sum + (val * c.weight);
  }, 0);
}

function getMaxScore(rubricKey) {
  const rubric = RUBRICS[rubricKey];
  if (!rubric) return 100;
  return rubric.reduce((s, c) => s + c.weight * 5, 0);
}

function getFilmScoreLocal(filmId) {
  if (!scores[filmId]) return 0;
  // Compute from current category rubric
  const cat = CATEGORIES[currentCategory];
  if (!cat) return 0;
  const rubric = RUBRICS[cat.rubric];
  return rubric.reduce((sum, c) => {
    return sum + ((scores[filmId][c.id] || 0) * c.weight);
  }, 0);
}

function updateFilmTotal(filmId) {
  const cat = CATEGORIES[currentCategory];
  if (!cat) return;
  const total = getFilmScoreLocal(filmId);
  const max = getMaxScore(cat.rubric);
  const el = document.querySelector(`[data-total="${filmId}"]`);
  if (el) {
    el.textContent = total;
    el.style.color = total > max*0.8 ? '#00e5a0' : total > max*0.6 ? '#f59e0b' : '#ffffff';
  }
  const pct = document.querySelector(`[data-progress="${filmId}"]`);
  if (pct) {
    pct.style.width = `${(total/max)*100}%`;
    pct.style.background = total > max*0.8 ? '#00e5a0' : total > max*0.6 ? '#f59e0b' : '#7c3aed';
  }
}

function updateRankingPanel() {
  const panel = document.querySelector('.ranking-panel');
  if (!panel || currentCategory === 'overview') return;
  const cat = CATEGORIES[currentCategory];
  if (!cat) return;

  const allFilms = getAllFilmsForCategory(currentCategory);
  const ranked = allFilms.map(f => ({
    ...f,
    score: getFilmScoreLocal(f.id),
    max: getMaxScore(cat.rubric)
  })).sort((a,b) => b.score - a.score);

  panel.innerHTML = `
    <div class="ranking-header">
      <span class="ranking-title">RANKING EN VIVO</span>
      <span class="ranking-cat" style="color:${cat.color}">${cat.label}</span>
    </div>
    <div class="ranking-list">
      ${ranked.map((f, i) => `
        <div class="ranking-item ${i===0&&f.score>0?'leader':''}">
          <span class="ranking-pos">${i+1}</span>
          ${f.poster ? `<img src="${f.poster}" alt="${f.title}" loading="lazy"
            style="width:32px;height:22px;object-fit:cover;border-radius:3px;flex-shrink:0"
            onerror="this.style.display='none'">` : ''}
          <span class="ranking-name">${f.title}</span>
          <span class="ranking-score" style="color:${i===0&&f.score>0?cat.color:'#888'}">${f.score}<span style="font-size:10px;color:#444">/${f.max}</span></span>
        </div>`).join('')}
    </div>`;
}

function updateLiveIndicators() {
  // Update progress dots in nav
  Object.entries(CATEGORIES).forEach(([catId, cat]) => {
    const allFilms = getAllFilmsForCategory(catId);
    let evaluated = 0;
    allFilms.forEach(f => {
      if (scores[f.id] && Object.keys(scores[f.id]).some(k => scores[f.id][k] > 0)) evaluated++;
    });
    const dot = document.querySelector(`[data-tab="${catId}"] .nav-dot`);
    if (dot && evaluated === allFilms.length && allFilms.length > 0) {
      dot.style.boxShadow = `0 0 6px ${cat.color}`;
    }
  });
}

function getAllFilmsForView() {
  if (currentCategory === 'internacional') return FILMS.intl;
  return [...FILMS['2d'], ...FILMS['3d'], ...FILMS.intl];
}

function getAllFilmsForCategory(catId) {
  if (catId === 'internacional') return FILMS.intl;
  if (catId === 'animacion-2d') return FILMS['2d'];
  if (catId === 'animacion-3d') return FILMS['3d'];
  // narrativa and direccion-arte: all propios (2D + 3D)
  return [...FILMS['2d'], ...FILMS['3d']];
}

// ─── ADMIN PANEL ──────────────────────────────────────────────────────────────
function getScoreForJudge(filmId, judgeId, rubricKey) {
  // Check allScores first (Firebase), then local scores if current judge
  const key = `${judgeId}_${filmId}`;
  const data = allScores[key];
  const localData = judgeId === currentJudge ? scores[filmId] : null;
  const rubric = RUBRICS[rubricKey];
  if (!rubric) return 0;
  const src = data || localData;
  if (!src) return 0;
  return rubric.reduce((sum, c) => {
    // allScores stores flat criteria.X keys
    const val = src[`criteria.${c.id}`] ?? src[c.id] ?? 0;
    return sum + (val * c.weight);
  }, 0);
}

            <div style="display:flex;gap:4px">

                onmouseenter="this.style.background='rgba(239,68,68,.18)'"

                ↺

    <div style="background:#111;border:1px solid #222;border-radius:10px;padding:16px 20px">
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;color:#444;margin-bottom:10px">LOG DE ACCIONES ADMINISTRATIVAS</div>

      </div>

  </div>`;

  // Wire admin actions
  window.adminResetFilm = async function(filmId, catId) {
    const film = [...FILMS['2d'],...FILMS['3d'],...FILMS.intl].find(f => f.id === filmId);
    if (!confirm(`⚠ ¿Resetear TODOS los puntajes de "${film?.title || filmId}"?\n\nEsto borrará las puntuaciones de ambos jueces en Firestore y localStorage.\nEsta acción no se puede deshacer.`)) return;

    // Clear local scores for this film
    if (scores[filmId]) {
      const notes = scores[filmId].notes;
      scores[filmId] = {};
      if (notes) scores[filmId].notes = notes; // preserve notes
      persistScores();
    }

    // Delete from Firebase
    if (db) {
      try {
        const { deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
        await deleteDoc(doc(db, 'scores', `A_${filmId}`));
        await deleteDoc(doc(db, 'scores', `B_${filmId}`));
      } catch(e) { console.warn('Firebase delete error:', e); }
    }

    // Clear from allScores cache
    delete allScores[`A_${filmId}`];
    delete allScores[`B_${filmId}`];

    addAdminLog(`✓ Reseteado: "${film?.title}" — ${new Date().toLocaleTimeString()}`);
    renderAdminPanel();
  };

  window.adminResetAll = async function() {
    if (!confirm('⚠ ¿RESETEAR TODAS LAS PUNTUACIONES?\n\nEsto borrará los puntajes de TODOS los cortometrajes de ambos jueces.\nEsta acción es irreversible.')) return;
    if (!confirm('⚠ SEGUNDA CONFIRMACIÓN: ¿Estás completamente seguro?\n\nEscribe "RESETEAR" en el siguiente diálogo para confirmar.')) return;
    const input = prompt('Escribe RESETEAR para confirmar:');
    if (input !== 'RESETEAR') { alert('Cancelado — texto incorrecto.'); return; }

    const allFilms = [...FILMS['2d'],...FILMS['3d'],...FILMS.intl];
    allFilms.forEach(f => {
      const notes = scores[f.id]?.notes;
      scores[f.id] = {};
      if (notes) scores[f.id].notes = notes;
    });
    persistScores();
    allScores = {};

    if (db) {
      try {
        const { deleteDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
        for (const f of allFilms) {
          await deleteDoc(doc(db, 'scores', `A_${f.id}`)).catch(()=>{});
          await deleteDoc(doc(db, 'scores', `B_${f.id}`)).catch(()=>{});
        }
      } catch(e) {}
    }

    addAdminLog(`⚠ RESET TOTAL — ${new Date().toLocaleTimeString()}`);
    renderAdminPanel();
  };
}

function addAdminLog(msg) {
  const log = document.getElementById('admin-log');
  if (!log) return;
  const entry = document.createElement('div');
  entry.style.color = '#666';
  entry.textContent = msg;
  if (log.querySelector('[style*="333"]')) log.innerHTML = '';
  log.prepend(entry);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

      <aside class="ranking-sidebar">
        <div class="ranking-panel">
          <div class="ranking-header">
            <span class="ranking-title">RANKING EN VIVO</span>
            <span class="ranking-cat" style="color:${cat.color}">${cat.label}</span>
          </div>
          <div class="ranking-list">
            ${films.map((f,i) => `
              <div class="ranking-item">
                <span class="ranking-pos">${i+1}</span>
                <span class="ranking-name">${f.title}</span>
                <span class="ranking-score">0<span style="font-size:10px;color:#444">/${maxScore}</span></span>
              </div>`).join('')}
          </div>
        </div>

        <!-- Criteria legend -->
        <div class="criteria-legend">
          <div class="legend-title">CRITERIOS · PESOS</div>
          ${rubric.map(c => `
            <div class="legend-item">
              <div class="legend-label">${c.label}</div>
              <div class="legend-weight">×${c.weight} <span style="color:#333">= máx ${c.weight*5}</span></div>
            </div>`).join('')}
          <div class="legend-total">TOTAL MÁXIMO: ${maxScore} pts</div>
        </div>
      </aside>
    </div>`;

  window.filterFilms = function(query) {
    document.querySelectorAll('.film-card').forEach(card => {
      const title = card.querySelector('.film-title').textContent.toLowerCase();
      card.style.display = title.includes(query.toLowerCase()) ? '' : 'none';
    });
  };

  updateEvaluatedCount(films);
}

function renderFilmCard(film, rubric, maxScore, catColor, idx) {
  const s = scores[film.id] || {};
  const total = rubric.reduce((sum, c) => sum + ((s[c.id]||0)*c.weight), 0);
  const isFinalized = s.finalized;
  const tc = total>maxScore*0.8?'#00e5a0':total>maxScore*0.6?'#f59e0b':'#fff';
  const pc = total>maxScore*0.8?'#00e5a0':total>maxScore*0.6?'#f59e0b':'#7c3aed';

  // Crew chips — avatars larger (32px), max 5 shown
  const crewHTML = (film.crew && film.crew.length > 0)
    ? `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px">
        ${film.crew.slice(0,5).map(c => `
          <div style="display:flex;align-items:center;gap:7px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:5px 10px 5px 5px;transition:border-color .15s" onmouseenter="this.style.borderColor='#3a3a3a'" onmouseleave="this.style.borderColor='#2a2a2a'">
            ${c.avatar
              ? `<img src="${c.avatar}" alt="${c.name}" loading="lazy"
                  style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid #333"
                  onerror="this.outerHTML='<div style=\\'width:28px;height:28px;border-radius:50%;background:#292929;border:1px solid #333;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#666\\'>${c.name.charAt(0)}</div>'">`
              : `<div style="width:28px;height:28px;border-radius:50%;background:#292929;border:1px solid #333;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#555">${c.name.charAt(0)}</div>`
            }
            <div style="display:flex;flex-direction:column;gap:0px;min-width:0">
              <span style="font-size:12px;font-weight:600;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;line-height:1.3" title="${c.name}">${c.name.split(' ')[0]} ${c.name.split(' ').slice(-1)[0]}</span>
              <span style="font-size:10px;color:#555;font-family:'JetBrains Mono',monospace;line-height:1.2">${c.role}</span>
            </div>
          </div>`).join('')}
        ${film.crew.length > 5 ? `<span style="font-size:11px;color:#444;font-family:'JetBrains Mono',monospace;align-self:center">+${film.crew.length-5}</span>` : ''}
      </div>`
    : '';

  return `
  <div class="film-card ${isFinalized?'finalized':''}" data-film="${film.id}" style="animation-delay:${idx*0.04}s">

    <!-- ─ HORIZONTAL HEADER: poster left + info right ─ -->
    <div style="display:flex;align-items:stretch;gap:0;border-bottom:1px solid #222">

      <!-- Poster — compact, fixed width -->
      <div style="width:88px;flex-shrink:0;position:relative;overflow:hidden;background:#111">
        ${film.poster
          ? `<img src="${film.poster}" alt="${film.title}" loading="lazy"
              style="width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease"
              onerror="this.parentElement.style.background='#161616'">`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#2a2a2a;font-size:22px">🎬</div>`
        }
        <!-- type pill over poster -->
        <div style="position:absolute;bottom:5px;left:5px">
          <span style="font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.06em;color:${catColor};background:rgba(0,0,0,.75);border:1px solid ${catColor}40">${film.type}</span>
        </div>
      </div>

      <!-- Info panel right of poster -->
      <div style="flex:1;padding:10px 12px;display:flex;flex-direction:column;justify-content:space-between;min-width:0">
        <div>
          <!-- Title + score on same row -->
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px">
            <h3 class="film-title" style="font-size:16px;line-height:1.2;margin:0">${film.title}</h3>
            <div style="display:flex;align-items:baseline;gap:2px;flex-shrink:0">
              <span data-total="${film.id}" style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;color:${tc};transition:color .3s">${total}</span>
              <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#444">/${maxScore}</span>
            </div>
          </div>
          <!-- Director + duration -->
          <div class="film-meta" style="font-size:12px;margin-bottom:0">${film.director} · ${film.duration}</div>
        </div>
        <!-- Progress bar -->
        <div style="height:2px;background:#1a1a1a;border-radius:2px;margin-top:8px;overflow:hidden">
          <div data-progress="${film.id}" style="height:100%;width:${(total/maxScore)*100}%;background:${pc};border-radius:2px;transition:width .4s ease,background .3s"></div>
        </div>
      </div>
    </div>

    <!-- ─ CREW AVATARS ─ -->
    ${crewHTML ? `<div style="padding:8px 12px;border-bottom:1px solid #1a1a1a">${crewHTML}</div>` : ''}

    <!-- ─ SYNOPSIS (collapsed, subtle) ─ -->
    ${film.synopsis ? `
    <div style="padding:7px 14px;border-bottom:1px solid #1a1a1a">
      <p style="font-size:12px;color:#444;line-height:1.5;font-style:italic;margin:0">${film.synopsis.length > 120 ? film.synopsis.substring(0,120)+'…' : film.synopsis}</p>
    </div>` : ''}

    <!-- ─ SCORING ROWS ─ -->
    <div class="scoring-grid" style="padding:10px 14px">
      ${rubric.map(c => `
        <div class="scoring-row" style="padding:7px 10px">
          <div class="scoring-criterion">
            <span class="criterion-name" style="font-size:13px">${c.label}</span>
            <span class="criterion-desc" style="font-size:11px">${c.desc}</span>
          </div>
          <div class="scoring-controls" data-score="${film.id}-${c.id}">
            ${[1,2,3,4,5].map(n => `
              <button class="score-btn ${(s[c.id]||0)===n?'active':''}"
                onclick="setScore('${film.id}','${c.id}',${n})"
                style="--active-color:${n>=4?'#00e5a0':n===3?'#f59e0b':'#ef4444'};width:32px;height:28px;font-size:13px">${n}</button>`).join('')}
            <span class="score-weight" style="font-size:11px">×${c.weight}</span>
            <span class="score-subtotal" style="font-size:13px">${(s[c.id]||0)*c.weight}</span>
          </div>
        </div>`).join('')}
    </div>

    <!-- ─ NOTES ─ -->
    <div class="notes-section" style="padding:0 14px 10px">
      <label class="notes-label">OBSERVACIONES</label>
      <textarea class="notes-textarea" data-notes="${film.id}"
        placeholder="Notas para la deliberación..."
        oninput="autoSaveNotes(this, '${film.id}')"
        style="min-height:52px;font-size:13px">${s.notes||''}</textarea>
    </div>

    <!-- ─ ACTIONS ─ -->
    <div class="card-actions" style="padding:8px 14px 12px">
      <button class="btn-finalize ${isFinalized?'done':''}" onclick="finalizeEvaluation('${film.id}')"
        style="height:36px;font-size:13px">
        ${isFinalized ? '✓ Evaluación finalizada' : 'Finalizar evaluación'}
      </button>
      <div class="card-actions-right">
        <span class="last-saved" id="saved-${film.id}"></span>
      </div>
    </div>
  </div>`;
}

function updateEvaluatedCount(films) {
  let count = 0;
  films.forEach(f => {
    if (scores[f.id] && Object.values(scores[f.id]).some(v => typeof v==='number'&&v>0)) count++;
  });
  const el = $('evaluated-count');
  if (el) el.textContent = count;
}

let saveTimers = {};
window.autoSaveNotes = function(ta, filmId) {
  clearTimeout(saveTimers[filmId]);
  saveTimers[filmId] = setTimeout(() => window.saveNotes(filmId), 800);
};

function showSaveConfirm(filmId) {
  const el = document.getElementById(`saved-${filmId}`);
  if (el) {
    el.textContent = '✓ Guardado';
    el.style.color = '#00e5a0';
    setTimeout(() => { el.textContent = ''; }, 2000);
  }
}
</script>
